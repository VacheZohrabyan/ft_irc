# Full IRC Server Configuration File

############################################################
# IRC SERVER CONFIGURATION
############################################################

#===========================================================
# Server Information
#===========================================================
server_name = ft_irc
server_description = Custom C++ IRC Server
server_host = 127.0.0.1
server_port = 6667
server_password = super_secret_password
server_version = 1.0.0
network_name = LocalIRC

#===========================================================
# Connection Limits
#===========================================================
max_clients = 100
max_connections_per_ip = 5
max_channels = 50
max_channels_per_user = 10
max_users_per_channel = 100
client_timeout_seconds = 300
ping_interval_seconds = 60
pong_timeout_seconds = 120
connection_backlog = 128

#===========================================================
# Nickname / Username Rules
#===========================================================
min_nickname_length = 2
max_nickname_length = 20
max_username_length = 20
max_realname_length = 50
allow_special_chars_in_nickname = false
nickname_change_cooldown_seconds = 5

#===========================================================
# Message Limits
#===========================================================
max_message_length = 512
max_topic_length = 300
max_channel_name_length = 50
max_modes_per_command = 3
max_away_message_length = 160

#===========================================================
# Channel Settings
#===========================================================
default_channel_mode = +nt
allow_channel_creation = true
allow_private_channels = true
allow_secret_channels = true
allow_invite_only_channels = true
allow_topic_restriction = true
allow_channel_keys = true
allow_user_limit_mode = true
channel_history_limit = 100

#===========================================================
# Feature Flags
#===========================================================
allow_guest_nicknames = true
allow_private_messages = true
allow_notice_messages = true
allow_who_command = true
allow_whois_command = true
allow_oper_command = true
allow_wallops = false
allow_kick_command = true
allow_invite_command = true
allow_mode_command = true
allow_topic_command = true
allow_away_command = true
allow_list_command = true
allow_names_command = true

#===========================================================
# Operator Configuration
#===========================================================
operator_name = admin
operator_password = admin_password
operator_hostmask = *@127.0.0.1
operator_can_kill = true
operator_can_gline = true
operator_can_rehash = true
operator_can_restart = false
operator_can_die = false

#===========================================================
# Logging
#===========================================================
enable_logging = true
log_file = logs/irc_server.log
log_level = info
log_connections = true
log_disconnections = true
log_failed_logins = true
log_commands = true
log_channels = true
log_private_messages = false
save_chat_history = true
chat_history_directory = logs/chats/

#===========================================================
# MOTD / Files
#===========================================================
motd_file = config/motd.txt
rules_file = config/rules.txt
ban_list_file = config/bans.txt
operator_file = config/operators.txt
channel_data_file = config/channels.txt
user_data_file = config/users.txt

#===========================================================
# Security / Anti-Spam
#===========================================================
max_messages_per_10_seconds = 20
max_joins_per_minute = 10
max_nick_changes_per_minute = 5
max_failed_login_attempts = 5
failed_login_ban_minutes = 15
anti_flood_enabled = true
anti_spam_enabled = true
anti_clone_connections = true
ignore_duplicate_messages = true

#===========================================================
# Ban Settings
#===========================================================
allow_temporary_bans = true
default_temporary_ban_minutes = 30
allow_permanent_bans = true
ban_exception_enabled = true
ban_mask_support = true

#===========================================================
# SSL / TLS Configuration
#===========================================================
enable_ssl = false
ssl_port = 6697
ssl_cert_file = ssl/server.crt
ssl_key_file = ssl/server.key
ssl_key_password = change_me

#===========================================================
# Debug Options
#===========================================================
debug_mode = false
print_raw_commands = false
print_raw_replies = false
save_debug_logs = false

#===========================================================
# Example Values For Development
#===========================================================
# server_password = 12345
# operator_password = admin123
# server_port = 6667
# max_clients = 50
############################################################